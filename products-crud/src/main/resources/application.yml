server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/qww-product?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never
      encoding: UTF-8

logging:
  level:
    com.qww.products: info

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-for-production-change-me-32-bytes}
    expiration-seconds: 86400
